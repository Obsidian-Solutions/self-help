name: CI

on:
  push:
    branches: [ main, 'feat/**', 'feature/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

    - name: Install Hugo
      run: |
        HUGO_VERSION=$(grep -oP "min = '\K[0-9.]+" hugo.toml)
        mkdir -p hugo_bin
        wget -q https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz
        tar -xzf hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz -C hugo_bin
        sudo mv hugo_bin/hugo /usr/local/bin/
        rm -rf hugo_bin hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz

    - name: Install Dependencies
      run: npm install

    - name: Install CMS Dependencies
      run: npm run cms:install

    - name: Run Lints
      run: npm run lint

    - name: Check Formatting
      run: npm run format:check

    - name: Build CSS
      run: npm run build:css

    - name: Build Hugo Site
      run: hugo --minify
