<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control Tower | Professional Site Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.css" />
    <script src="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.js"></script>
    <link rel="stylesheet" href="css/admin.css" />
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        overflow: hidden;
        height: 100vh;
      }
      .cms-wrapper {
        display: flex;
        height: calc(100vh - 64px);
        background: #f3f4f6;
      }
      .preview-pane {
        flex: 1;
        overflow-y: auto;
        background: #f9fafb;
        position: relative;
        border-right: 1px solid #e5e7eb;
      }
      .dark .preview-pane {
        background: #111827;
      }
      .resizer {
        flex: 0 0 10px;
        cursor: col-resize;
        background: transparent;
        transition: background 0.2s;
        z-index: 50;
        border-left: 1px solid #e5e7eb;
        border-right: 1px solid #e5e7eb;
      }
      .resizer:hover,
      .resizer.resizing {
        background: #4f46e5;
      }
      .editor-pane {
        flex: 0 0 600px;
        min-width: 400px;
        overflow-y: auto;
        background: white;
        display: flex;
        flex-direction: column;
      }
      .CodeMirror {
        flex: 1;
        border: none !important;
        font-family: 'Fira Code', monospace;
        font-size: 14px;
      }
      .editor-toolbar {
        border: none !important;
        border-bottom: 1px solid #e5e7eb !important;
        background: white !important;
      }
    </style>
  </head>
  <body class="h-full bg-gray-50 dark:bg-gray-900">
    <div id="toaster" class="fixed top-5 right-5 z-[100] space-y-2"></div>

    <aside id="admin-sidebar" class="hidden w-64 bg-[#1a1c23] flex-shrink-0 flex flex-col z-40">
      <div class="p-6 flex items-center gap-3">
        <div
          class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-xl"
        >
          <i class="fa-solid fa-terminal"></i>
        </div>
        <div>
          <h2 class="text-white font-extrabold tracking-tight">MindFull</h2>
          <p class="text-[9px] text-slate-500 font-black uppercase">Control Tower</p>
        </div>
      </div>
      <nav class="flex-1 mt-4 px-4 space-y-6">
        <div>
          <p class="px-4 py-2 text-[10px] font-black text-slate-500 uppercase">Publishing</p>
          <div class="space-y-1 mt-2">
            <a
              href="#dashboard"
              class="nav-link w-full flex items-center gap-3 px-4 py-3 text-sm font-semibold text-slate-400 rounded-xl hover:text-white hover:bg-slate-800"
              ><i class="fa-solid fa-chart-line w-5"></i> Insights</a
            >
            <a
              href="#content"
              class="nav-link w-full flex items-center gap-3 px-4 py-3 text-sm font-semibold text-slate-400 rounded-xl hover:text-white hover:bg-slate-800"
              ><i class="fa-solid fa-file-pen w-5"></i> CMS Manager</a
            >
          </div>
        </div>
      </nav>
      <div class="p-6 mt-auto border-t border-slate-800/50">
        <button
          data-action="logout"
          class="w-full flex items-center gap-3 text-sm font-bold text-red-400"
        >
          Sign Out
        </button>
      </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <header
        id="admin-header"
        class="hidden h-16 bg-white border-b border-slate-200 flex items-center justify-between px-10 shrink-0 dark:bg-gray-950 dark:border-gray-800"
      >
        <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
          Site Management /
          <span id="breadcrumb-active" class="text-slate-900 dark:text-white">OVERVIEW</span>
        </div>
        <div class="flex items-center gap-6">
          <div
            id="cms-status-indicator"
            class="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full text-[9px] font-black uppercase"
          >
            Link Active
          </div>
          <p id="admin-display-name" class="text-xs font-bold text-slate-900 dark:text-white">--</p>
        </div>
      </header>

      <main id="admin-main" class="hidden flex-1 overflow-y-auto">
        <div id="section-dashboard" class="admin-section p-10 space-y-10">
          <div id="dashboard-stats" class="grid grid-cols-4 gap-6"></div>
        </div>
        <div id="section-content" class="admin-section p-10 hidden space-y-6">
          <div id="collection-view" class="grid grid-cols-3 gap-6"></div>
        </div>

        <div id="section-editor" class="admin-section hidden h-full">
          <div class="cms-wrapper">
            <!-- PREVIEW LEFT -->
            <div class="preview-pane" id="preview-container">
              <iframe id="site-iframe" class="w-full h-full border-none"></iframe>
              <div
                id="iframe-loader"
                class="absolute inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center opacity-0 pointer-events-none transition-opacity dark:bg-gray-950/80"
              >
                <i class="fa-solid fa-circle-notch animate-spin text-indigo-600 text-2xl"></i>
              </div>
            </div>
            <div class="resizer" id="drag-handle"></div>
            <!-- EDITOR RIGHT -->
            <div class="editor-pane" id="editor-side">
              <div
                class="p-6 border-b flex items-center justify-between shrink-0 dark:border-gray-800"
              >
                <a href="#content" class="text-xs font-black text-indigo-600 uppercase"
                  >&larr; Exit</a
                >
                <button
                  data-action="publish"
                  class="bg-indigo-600 text-white px-8 py-2 rounded-xl font-black text-[10px] uppercase shadow-lg shadow-indigo-100"
                >
                  Publish to Hugo
                </button>
              </div>
              <div class="flex-1 flex flex-col"><textarea id="editor-textarea"></textarea></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Login -->
    <div
      id="login-modal"
      class="fixed inset-0 bg-[#1a1c23] flex items-center justify-center z-50 p-4"
    >
      <div class="w-full max-w-sm bg-white rounded-[2.5rem] p-10 shadow-2xl relative">
        <div class="absolute top-0 left-0 w-full h-2 bg-indigo-600 rounded-t-full"></div>
        <div class="text-center mb-10">
          <div
            class="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center text-white mx-auto mb-6"
          >
            <i class="fa-solid fa-terminal text-2xl"></i>
          </div>
          <h2 class="text-2xl font-black tracking-tight">Operations Hub</h2>
        </div>
        <div class="space-y-4">
          <input
            type="email"
            id="email"
            placeholder="Identity"
            class="w-full px-6 py-4 bg-slate-50 rounded-xl border-none font-bold"
          />
          <input
            type="password"
            id="password"
            placeholder="Key"
            class="w-full px-6 py-4 bg-slate-50 rounded-xl border-none font-bold"
          />
          <button
            type="button"
            id="login-submit-btn"
            class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-xl hover:bg-indigo-700 transition-all"
          >
            Authenticate &rarr;
          </button>
          <div
            id="login-status"
            class="text-center text-[10px] font-bold uppercase text-slate-400 mt-4"
          ></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
