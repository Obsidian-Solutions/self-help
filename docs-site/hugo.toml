baseURL = 'https://obsidiansolutions.co.uk/self-help/docs/'
languageCode = 'en-us'
title = 'MindFull Documentation'

[module]
  [[module.imports]]
    path = "github.com/alex-shpak/hugo-book"

  # Mount docs virtually from root _docs_src
  [[module.mounts]]
    source = 'content'
    target = 'content'
  [[module.mounts]]
    source = '../_docs_src'
    target = 'content'

  # Mount shortcodes and partials from main site
  [[module.mounts]]
    source = '../layouts/shortcodes'
    target = 'layouts/shortcodes'
  [[module.mounts]]
    source = '../layouts/partials/shared'
    target = 'layouts/partials/shared'
  
  # Mount assets (for illustrations)
  [[module.mounts]]
    source = '../assets'
    target = 'assets'

  # Mount data (for catalog/mapping)
  [[module.mounts]]
    source = '../data'
    target = 'data'

[params]
  BookLogo = 'logo.svg'
  BookTitle = 'MindFull Docs'
  BookSearch = true
  BookSectionEnumerable = true
  BookToC = true
  BookMenuBundle = false
  BookRepo = 'https://github.com/Obsidian-Solutions/self-help'
  BookEditPath = 'edit/main/_docs_src'
  BookTheme = 'auto'
