<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://fonts.googleapis.com">
<link rel="dns-prefetch" href="https://fonts.gstatic.com">

{{- $fontUrl := "https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" -}}
<link rel="preload" href="{{ $fontUrl }}" as="style">
<link href="{{ $fontUrl }}" rel="stylesheet">

<style>
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>

{{- with resources.Get "css/main.css" }}
  {{- $style := . }}
  {{- if not hugo.IsDevelopment }}
    {{- $style = . | minify | fingerprint }}
  {{- end }}
  <link rel="preload" href="{{ $style.RelPermalink }}" as="style">
  <link rel="stylesheet" href="{{ $style.RelPermalink }}" {{ if not hugo.IsDevelopment }}integrity="{{ $style.Data.Integrity }}" crossorigin="anonymous"{{ end }}>
{{- end }}
