<!-- Signup Modal -->
<div id="signupModal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
  <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onclick="window.closeModal('signupModal')"></div>

    <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

    <!-- Modal Panel -->
    <div class="inline-block align-bottom bg-white dark:bg-gray-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
      <div class="bg-white dark:bg-gray-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
        <div class="sm:flex sm:items-start">
          <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
            <h3 class="text-2xl leading-6 font-bold text-gray-900 dark:text-white" id="modal-title">
              {{ .Site.Data.labels.auth_modals.signup.title }}
            </h3>
            
            <form class="mt-6 space-y-6" onsubmit="window.handleSignup(event)">
              <div>
                <label for="signup-name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                  {{ .Site.Data.labels.auth_modals.signup.name_label }}
                </label>
                <input type="text" name="name" id="signup-name" required 
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm py-2 px-3"
                  placeholder="{{ .Site.Data.labels.auth_modals.signup.name_placeholder }}">
              </div>

              <div>
                <label for="signup-email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                  {{ .Site.Data.labels.auth_modals.signup.email_label }}
                </label>
                <input type="email" name="email" id="signup-email" required 
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm py-2 px-3"
                  placeholder="{{ .Site.Data.labels.auth_modals.signup.email_placeholder }}">
              </div>

              <div>
                <label for="signup-password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                  {{ .Site.Data.labels.auth_modals.signup.password_label }}
                </label>
                <input type="password" name="password" id="signup-password" required 
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm py-2 px-3"
                  placeholder="{{ .Site.Data.labels.auth_modals.signup.password_placeholder }}">
              </div>

              <div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                  {{ .Site.Data.labels.auth_modals.signup.submit_btn }}
                </button>
              </div>
            </form>

            <div class="mt-6">
              <div class="relative">
                <div class="absolute inset-0 flex items-center">
                  <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                  <span class="px-2 bg-white dark:bg-gray-800 text-gray-500">
                    {{ .Site.Data.labels.auth_modals.signup.sso_divider }}
                  </span>
                </div>
              </div>

              <div class="mt-6">
                <button onclick="window.handleGoogleLogin()" class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white dark:bg-gray-700 text-sm font-medium text-gray-500 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600">
                  <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.18 1-.78 1.85-1.63 2.42v2.77h2.64c1.55-2.43 2.43-6.01 2.43-9.45Z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-2.64-2.77c-.73.49-1.66.78-2.64.78-2.03 0-3.74-1.37-4.35-3.22H3.88v2.13A10.996 10.996 0 0 0 12 23Z"/><path fill="currentColor" d="M7.65 15.13c-.15-.45-.24-.93-.24-1.43s.09-1.43.24-1.43V10.14H3.88c-.56 1.1-.88 2.34-.88 3.61s.32 2.51.88 3.61l3.77-2.13Z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-3.19 3.71-5.53 12-5.53Z"/></svg>
                  {{ .Site.Data.labels.auth_modals.signup.sso_google }}
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="bg-gray-50 dark:bg-gray-700 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
        <span class="text-sm text-gray-500 dark:text-gray-400">
          {{ .Site.Data.labels.auth_modals.signup.footer_text }} 
          <a href="#" onclick="window.switchModal('signupModal', 'loginModal')" class="font-medium text-indigo-600 hover:text-indigo-500 dark:text-indigo-400">
            {{ .Site.Data.labels.auth_modals.signup.footer_link }}
          </a>
        </span>
      </div>
    </div>
  </div>
</div>
