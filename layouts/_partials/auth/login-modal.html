<div id="loginModal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
  <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onclick="window.closeModal('loginModal')"></div>

    <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

    <!-- Modal Panel -->
    <div class="inline-block align-bottom bg-white dark:bg-gray-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
      <div class="bg-white dark:bg-gray-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
        <div class="sm:flex sm:items-start">
          <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
            <h3 class="text-2xl leading-6 font-bold text-gray-900 dark:text-white" id="modal-title">
              {{ .Site.Data.labels.auth_modals.login.title }}
            </h3>
            
            <form class="mt-6 space-y-6" onsubmit="window.handleLogin(event)">
              <div>
                <label for="login-email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                  {{ .Site.Data.labels.auth_modals.login.email_label }}
                </label>
                <input type="email" name="email" id="login-email" required 
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm py-2 px-3"
                  placeholder="{{ .Site.Data.labels.auth_modals.login.email_placeholder }}">
              </div>

              <div>
                <label for="login-password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                  {{ .Site.Data.labels.auth_modals.login.password_label }}
                </label>
                <input type="password" name="password" id="login-password" required 
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm py-2 px-3"
                  placeholder="{{ .Site.Data.labels.auth_modals.login.password_placeholder }}">
              </div>

              <div class="flex items-center justify-between">
                <div class="text-sm">
                  <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500 dark:text-indigo-400">
                    Forgot your password?
                  </a>
                </div>
              </div>

              <div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                  {{ .Site.Data.labels.auth_modals.login.submit_btn }}
                </button>
              </div>
            </form>

            <div class="mt-6">
              <div class="relative">
                <div class="absolute inset-0 flex items-center">
                  <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                  <span class="px-2 bg-white dark:bg-gray-800 text-gray-500">
                    {{ .Site.Data.labels.auth_modals.login.sso_divider }}
                  </span>
                </div>
              </div>

              <div class="mt-6 grid grid-cols-2 gap-3">
                <button onclick="window.handleGoogleLogin()" class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white dark:bg-gray-700 text-sm font-medium text-gray-500 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600">
                  <span class="sr-only">Sign in with Google</span>
                  <i class="fa-brands fa-google text-red-500"></i>
                  <span class="ml-2">Google</span>
                </button>
                
                <!-- NEW Demo Button -->
                <button onclick="window.handleDemoLogin()" class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white dark:bg-gray-700 text-sm font-medium text-gray-500 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600" title="Quick Login for Testing">
                  <i class="fa-solid fa-user-astronaut text-indigo-500"></i>
                  <span class="ml-2">Demo User</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="bg-gray-50 dark:bg-gray-700 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
        <span class="text-sm text-gray-500 dark:text-gray-400">
          {{ .Site.Data.labels.auth_modals.login.footer_text }} 
          <a href="#" onclick="window.switchModal('loginModal', 'signupModal')" class="font-medium text-indigo-600 hover:text-indigo-500 dark:text-indigo-400">
            {{ .Site.Data.labels.auth_modals.login.footer_link }}
          </a>
        </span>
      </div>
    </div>
  </div>
</div>
