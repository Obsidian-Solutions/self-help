  </div>

    <p class="text-xs text-gray-600 dark:text-gray-400 mt-2 text-center">Check in 7 days</p>

  <div class="badge-card group cursor-pointer" data-badge="anxiety-warrior">
    <div class="aspect-square bg-gradient-to-br from-orange-400 to-orange-600 rounded-lg flex flex-col items-center justify-center text-white shadow-md hover:shadow-lg transition-shadow opacity-40 group-hover:opacity-100">
      <span class="text-3xl mb-2">⚔️</span>
      <span class="text-xs font-bold text-center px-2">Anxiety Master</span>

</div>

<style>
.badge-card:hover .aspect-square {
  transform: scale(1.05);
}

.badge-card .aspect-square {
  transition: transform 0.2s ease-out;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Check which badges have been earned based on localStorage data
  const badgeData = JSON.parse(localStorage.getItem('badges') || '{}');
  
  document.querySelectorAll('.badge-card').forEach(card => {
    const badge = card.getAttribute('data-badge');
    if (badgeData[badge]) {
      card.querySelector('.aspect-square').style.opacity = '1';
      card.classList.add('earned');
    }
  });
});
</script>
