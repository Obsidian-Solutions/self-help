<div class="achievement-badges grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
  <!-- First Course Badge -->
  <div class="badge-card group cursor-pointer" data-badge="first-course">
    <div
      class="aspect-square bg-gradient-to-br from-blue-400 to-blue-600 rounded-lg flex flex-col items-center justify-center text-white shadow-md hover:shadow-lg transition-shadow opacity-40 group-hover:opacity-100"
    >
      <span class="text-3xl mb-2">📚</span>
      <span class="text-xs font-bold text-center px-2">First Course</span>
    </div>
    <p class="text-xs text-gray-600 dark:text-gray-400 mt-2 text-center">Complete 1 course</p>
  </div>

  <!-- Meditation Streak -->
  <div class="badge-card group cursor-pointer" data-badge="meditation-streak">
    <div
      class="aspect-square bg-gradient-to-br from-green-400 to-green-600 rounded-lg flex flex-col items-center justify-center text-white shadow-md hover:shadow-lg transition-shadow opacity-40 group-hover:opacity-100"
    >
      <span class="text-3xl mb-2">🧘</span>
      <span class="text-xs font-bold text-center px-2">7 Day Streak</span>
    </div>
    <p class="text-xs text-gray-600 dark:text-gray-400 mt-2 text-center">Check in 7 days</p>
  </div>

  <!-- Feelings Explorer -->
  <div class="badge-card group cursor-pointer" data-badge="feelings-explorer">
    <div
      class="aspect-square bg-gradient-to-br from-purple-400 to-purple-600 rounded-lg flex flex-col items-center justify-center text-white shadow-md hover:shadow-lg transition-shadow opacity-40 group-hover:opacity-100"
    >
      <span class="text-3xl mb-2">🎯</span>
      <span class="text-xs font-bold text-center px-2">Feelings Expert</span>
    </div>
    <p class="text-xs text-gray-600 dark:text-gray-400 mt-2 text-center">Complete 3 quizzes</p>
  </div>

  <!-- Anxiety Warrior -->
  <div class="badge-card group cursor-pointer" data-badge="anxiety-warrior">
    <div
      class="aspect-square bg-gradient-to-br from-orange-400 to-orange-600 rounded-lg flex flex-col items-center justify-center text-white shadow-md hover:shadow-lg transition-shadow opacity-40 group-hover:opacity-100"
    >
      <span class="text-3xl mb-2">⚔️</span>
      <span class="text-xs font-bold text-center px-2">Anxiety Master</span>
    </div>
    <p class="text-xs text-gray-600 dark:text-gray-400 mt-2 text-center">Complete Anxiety course</p>
  </div>

  <!-- Sleep Wizard -->
  <div class="badge-card group cursor-pointer" data-badge="sleep-wizard">
    <div
      class="aspect-square bg-gradient-to-br from-indigo-400 to-indigo-600 rounded-lg flex flex-col items-center justify-center text-white shadow-md hover:shadow-lg transition-shadow opacity-40 group-hover:opacity-100"
    >
      <span class="text-3xl mb-2">😴</span>
      <span class="text-xs font-bold text-center px-2">Sleep Master</span>
    </div>
    <p class="text-xs text-gray-600 dark:text-gray-400 mt-2 text-center">Complete Sleep course</p>
  </div>

  <!-- Journaling Champion -->
  <div class="badge-card group cursor-pointer" data-badge="journaling-champ">
    <div
      class="aspect-square bg-gradient-to-br from-pink-400 to-pink-600 rounded-lg flex flex-col items-center justify-center text-white shadow-md hover:shadow-lg transition-shadow opacity-40 group-hover:opacity-100"
    >
      <span class="text-3xl mb-2">📝</span>
      <span class="text-xs font-bold text-center px-2">Journal Pro</span>
    </div>
    <p class="text-xs text-gray-600 dark:text-gray-400 mt-2 text-center">Write 10 entries</p>
  </div>
</div>

<style>
  .badge-card:hover .aspect-square {
    transform: scale(1.05);
  }

  .badge-card .aspect-square {
    transition: transform 0.2s ease-out;
  }
</style>

<script>
  function refreshAchievements() {
    const badges = JSON.parse(localStorage.getItem('badges') || '{}');
    const courseProgress = JSON.parse(localStorage.getItem('courseProgress') || '{}');
    const moodStreak = JSON.parse(localStorage.getItem('moodStreak') || '{"count": 0}');
    const journalEntries = JSON.parse(localStorage.getItem('journalEntries') || '[]');
    const quizResults = JSON.parse(localStorage.getItem('quizResults') || '[]');

    let updated = false;

    // First Course Badge
    const completedCourses = new Set();
    Object.values(courseProgress).forEach(lesson => {
      if (lesson.completed) completedCourses.add(lesson.course);
    });
    if (completedCourses.size >= 1 && !badges['first-course']) {
      badges['first-course'] = true;
      updated = true;
    }

    // Meditation Streak (7 days)
    if (moodStreak.count >= 7 && !badges['meditation-streak']) {
      badges['meditation-streak'] = true;
      updated = true;
    }

    // Feelings Explorer (Complete 3 quizzes with 80%+)
    const highScores = quizResults.filter(r => r.score >= 80).length;
    if (highScores >= 3 && !badges['feelings-explorer']) {
      badges['feelings-explorer'] = true;
      updated = true;
    }

    // Anxiety Warrior (Assume course complete if major lesson is done for demo)
    if (
      courseProgress['Understanding Anxiety: The Basics']?.completed &&
      !badges['anxiety-warrior']
    ) {
      badges['anxiety-warrior'] = true;
      updated = true;
    }

    // Sleep Wizard
    if (courseProgress['Lesson 1: The Science of Sleep']?.completed && !badges['sleep-wizard']) {
      badges['sleep-wizard'] = true;
      updated = true;
    }

    // Journaling Champion (10 entries)
    if (journalEntries.length >= 10 && !badges['journaling-champ']) {
      badges['journaling-champ'] = true;
      updated = true;
    }

    if (updated) {
      localStorage.setItem('badges', JSON.stringify(badges));
    }

    // Update UI
    document.querySelectorAll('.badge-card').forEach(card => {
      const badge = card.getAttribute('data-badge');
      if (badges[badge]) {
        card.querySelector('.aspect-square').style.opacity = '1';
        card.classList.add('earned');
      }
    });
  }

  document.addEventListener('DOMContentLoaded', refreshAchievements);
</script>
