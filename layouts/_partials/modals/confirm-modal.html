<div
  id="confirm-modal"
  data-modal-backdrop
  class="hidden fixed inset-0 z-[60] overflow-y-auto bg-gray-900/50 backdrop-blur-sm flex items-center justify-center p-4"
  onclick="if (event.target === this) window.closeConfirmModal();"
>
  <div
    data-modal-content
    class="relative bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-sm transform transition-all duration-300"
  >
    <div class="p-6 text-center">
      <div
        class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 dark:bg-red-900/30 mb-4"
      >
        <svg
          class="h-6 w-6 text-red-600 dark:text-red-400"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          />
        </svg>
      </div>
      <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2" id="confirm-title">
        Are you sure?
      </h3>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-6" id="confirm-message">
        This action cannot be undone.
      </p>

      <div class="flex flex-col gap-2">
        <button
          id="confirm-button"
          class="w-full py-2 px-4 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition-colors"
        >
          Confirm
        </button>
        <button
          onclick="window.closeConfirmModal()"
          class="w-full py-2 px-4 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-semibold rounded-lg transition-colors"
        >
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  let confirmCallback = null;

  window.showConfirm = function (title, message, onConfirm) {
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-message').textContent = message;
    confirmCallback = onConfirm;
    document.getElementById('confirm-modal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  };

  window.closeConfirmModal = function () {
    document.getElementById('confirm-modal').classList.add('hidden');
    document.body.style.overflow = '';
    confirmCallback = null;
  };

  document.getElementById('confirm-button').addEventListener('click', function () {
    if (confirmCallback) {
      confirmCallback();
    }
    window.closeConfirmModal();
  });
</script>
