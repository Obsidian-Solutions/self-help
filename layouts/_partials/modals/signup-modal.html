<!-- Signup Modal -->
<div id="signupModal" data-modal-backdrop class="hidden">
  <div data-modal-content class="w-full max-w-md mx-4">
    <!-- Modal Header -->
    <div data-modal-header>
      <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Create Account</h2>
      <button
        data-modal-close
        onclick="window.closeModal('signupModal')"
        class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 text-2xl leading-none"
      >
        &times;
      </button>
    </div>

    <!-- Modal Body -->
    <div data-modal-body>
      <form
        class="space-y-4"
        onsubmit="
          window.handleSignup(event);
          return false;
        "
      >
        <div>
          <label
            for="signup-name"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300"
            >Full Name</label
          >
          <input
            id="signup-name"
            name="name"
            type="text"
            required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 dark:bg-gray-700 dark:text-white sm:text-sm"
          />
        </div>
        <div>
          <label
            for="signup-email"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300"
            >Email</label
          >
          <input
            id="signup-email"
            name="email"
            type="email"
            required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 dark:bg-gray-700 dark:text-white sm:text-sm"
          />
        </div>
        <div>
          <label
            for="signup-password"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300"
            >Password</label
          >
          <input
            id="signup-password"
            name="password"
            type="password"
            required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 dark:bg-gray-700 dark:text-white sm:text-sm"
          />
        </div>
        <button
          type="submit"
          class="w-full py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-700 dark:hover:bg-indigo-600"
        >
          Create Account
        </button>
      </form>
      <p class="mt-4 text-center text-sm text-gray-600 dark:text-gray-400">
        Already have an account?
        <a
          href="#"
          onclick="window.switchModal('signupModal', 'loginModal')"
          class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-500"
          >Sign in</a
        >
      </p>
    </div>
  </div>
</div>
