<div class="mood-selector" id="mood-selector-container">
  <div id="mood-check-in-view">
    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">
      How are you feeling today?
    </h3>
    <div class="grid grid-cols-5 gap-2">
      {{ range .Site.Data.labels.moods }}
      <button
        class="mood-btn p-4 rounded-lg text-center transition-all hover:scale-110 hover:shadow-lg bg-white dark:bg-gray-700 border-2 border-gray-200 dark:border-gray-600 hover:border-indigo-500 dark:hover:border-indigo-400"
        data-mood="{{ .emoji }} {{ .label }}"
      >
        <div class="text-3xl mb-2">{{ .emoji }}</div>
        <div class="text-xs font-medium text-gray-600 dark:text-gray-300">
          {{ .label }}
        </div>
      </button>
      {{ end }}
    </div>
    <button
      id="mood-submit"
      class="mt-4 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg transition-colors dark:bg-indigo-700 dark:hover:bg-indigo-600"
    >
      Save Check-In
    </button>
  </div>

  <div id="mood-completed-view" style="display: none" class="text-center py-6">
    <div
      class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 dark:bg-green-900 text-green-600 dark:text-green-300 mb-4"
    >
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M5 13l4 4L19 7"
        ></path>
      </svg>
    </div>
    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-1">Mood Logged!</h3>
    <p class="text-gray-600 dark:text-gray-400 mb-4">
      You've already checked in for today. Great job practicing self-awareness!
    </p>
    <div
      id="logged-mood-display"
      class="inline-block px-4 py-2 rounded-full bg-indigo-50 dark:bg-indigo-900 text-indigo-700 dark:text-indigo-300 font-medium"
    >
      <!-- Will be populated by JS -->
    </div>
  </div>
</div>

<style>
  .mood-selector {
    animation: slideUp 0.3s ease-out;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .mood-btn {
    cursor: pointer;
  }

  .mood-btn.active {
    border-color: #4f46e5;
    background-color: #eef2ff;
  }

  .dark .mood-btn.active {
    background-color: #312e81;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const moodBtns = document.querySelectorAll('.mood-btn');
    const submitBtn = document.getElementById('mood-submit');
    const checkInView = document.getElementById('mood-check-in-view');
    const completedView = document.getElementById('mood-completed-view');
    const loggedMoodDisplay = document.getElementById('logged-mood-display');
    const today = new Date().toISOString().split('T')[0];
    let selectedMood = null;

    // Check if already checked in today
    const moodData = JSON.parse(localStorage.getItem('moodCheckins') || '{}');
    if (moodData[today]) {
      showCompletedView(moodData[today]);
    }

    function showCompletedView(mood) {
      checkInView.style.display = 'none';
      completedView.style.display = 'block';
      loggedMoodDisplay.textContent = `Today's mood: ${mood}`;
    }

    moodBtns.forEach(btn => {
      btn.addEventListener('click', function () {
        moodBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        selectedMood = this.getAttribute('data-mood');
      });
    });

    if (submitBtn) {
      submitBtn.addEventListener('click', function () {
        if (selectedMood) {
          const moodData = JSON.parse(localStorage.getItem('moodCheckins') || '{}');
          moodData[today] = selectedMood;
          localStorage.setItem('moodCheckins', JSON.stringify(moodData));

          // Update streak
          updateMoodStreak();

          showCompletedView(selectedMood);
          if (window.showToast) {
            window.showToast('Mood check-in saved! Keep taking care of yourself.', 'success');
          } else {
            alert('Mood check-in saved! Keep taking care of yourself.');
          }
        } else {
          if (window.showToast) {
            window.showToast('Please select a mood first', 'error');
          } else {
            alert('Please select a mood first');
          }
        }
      });
    }

    function updateMoodStreak() {
      // Basic streak logic
      let streakData = JSON.parse(
        localStorage.getItem('moodStreak') || '{"count": 0, "lastCheckin": ""}',
      );
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = yesterday.toISOString().split('T')[0];

      if (streakData.lastCheckin === yesterdayStr) {
        streakData.count += 1;
      } else if (streakData.lastCheckin !== today) {
        streakData.count = 1;
      }

      streakData.lastCheckin = today;
      localStorage.setItem('moodStreak', JSON.stringify(streakData));
    }
  });
</script>
