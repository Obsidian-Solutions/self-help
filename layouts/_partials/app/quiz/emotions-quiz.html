<div class="bg-white dark:bg-gray-800 rounded-[2.5rem] p-10 border border-gray-100 dark:border-gray-700 shadow-sm overflow-hidden relative group">
  <!-- Decorative Background -->
  <div class="absolute -top-24 -right-24 w-64 h-64 bg-indigo-50 dark:bg-indigo-950/20 rounded-full blur-3xl group-hover:scale-110 transition-transform duration-1000"></div>
  
  <div class="relative z-10 max-w-2xl mx-auto">
    <div class="text-center mb-12">
      <div class="inline-flex items-center px-3 py-1 rounded-full bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 text-[10px] font-black uppercase tracking-widest mb-4">
        Interactive Assessment
      </div>
      <h2 class="text-3xl font-black text-gray-900 dark:text-white tracking-tighter sm:text-4xl mb-4">
        Understand Your Emotions
      </h2>
      <p class="text-lg text-gray-500 dark:text-gray-400 font-medium">
        Take this 2-minute quiz to explore your current emotional awareness and learn key CBT concepts.
      </p>
    </div>

    <div class="bg-gray-50/50 dark:bg-gray-900/30 rounded-3xl p-2">
      {{ partial "app/quiz/quiz-engine.html" . }}
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const emotionQuiz = {
      title: 'Emotional Awareness',
      description: 'Explore the basics of emotional intelligence',
      resultMessage: 'Great work! You have completed the assessment.',
      questions: [
        {
          question: 'What is the primary purpose of emotions?',
          options: [
            'To make us feel bad',
            'To provide information and guide our behavior',
            'To confuse us',
            'They serve no purpose',
          ],
          correct: 1,
          explanation:
            'Emotions serve important functions - they provide information about our needs and help guide our behavior and decision-making.',
        },
        {
          question: 'Which of these is a primary emotion?',
          options: ['Jealousy', 'Embarrassment', 'Sadness', 'Guilt'],
          correct: 2,
          explanation:
            'Sadness is considered a primary emotion. Primary emotions include happiness, sadness, fear, anger, and disgust.',
        },
        {
          question: 'What does it mean to have emotional awareness?',
          options: [
            'Never feeling negative emotions',
            'Being able to recognize and understand your emotions',
            'Suppressing all emotions',
            'Only experiencing positive emotions',
          ],
          correct: 1,
          explanation:
            'Emotional awareness means being able to identify, understand, and accept your emotions - both positive and negative.',
        },
        {
          question: "When experiencing anxiety, what's a helpful first step?",
          options: [
            'Ignore it completely',
            'Name and acknowledge the emotion',
            'Judge yourself for feeling it',
            'Try to eliminate it immediately',
          ],
          correct: 1,
          explanation:
            'Naming and acknowledging emotions is a key step in emotional regulation. This helps activate the thinking part of your brain.',
        },
        {
          question: 'How are emotions and thoughts connected?',
          options: [
            'They are completely separate',
            'Emotions always come before thoughts',
            'Thoughts and emotions influence each other',
            'Only emotions matter',
          ],
          correct: 2,
          explanation:
            "There's a strong connection between thoughts, emotions, and behaviors. Changing one can influence the others - this is the basis of CBT!",
        },
      ],
    };

    if (document.querySelector('.quiz-container')) {
      initializeQuiz(emotionQuiz);
    }
  });
</script>
