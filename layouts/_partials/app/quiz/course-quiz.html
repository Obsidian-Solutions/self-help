{{ $labels := site.Data.labels.quiz }}
<div class="mt-12 pt-8 border-t border-gray-200 dark:border-gray-700">
  <div class="bg-gradient-to-r from-indigo-50 to-purple-50 dark:from-indigo-900 dark:to-purple-900 rounded-lg p-8">
    <h3 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">
      {{ $labels.default_title }}
    </h3>
    <p class="text-gray-600 dark:text-gray-300 mb-6">
      {{ $labels.default_description }}
    </p>

    <button
      onclick="initLessonQuiz()"
      class="bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-700 dark:hover:bg-indigo-600 text-white font-medium py-3 px-6 rounded-lg transition-colors"
    >
      {{ $labels.start_btn }}
    </button>
  </div>

  <!-- Quiz Container (hidden by default) -->
  <div
    id="lesson-quiz-container"
    style="display: none"
    class="mt-8 bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6"
  >
    {{ partial "app/quiz/quiz-engine.html" . }}
  </div>
</div>
