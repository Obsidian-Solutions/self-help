{{ $labels := index .Site.Data.labels "sidebar" }}
<aside class="w-72 h-screen fixed left-0 top-0 border-r border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-900 hidden lg:flex flex-col z-50">
  <div class="p-8">
    <a href="/" class="flex items-center space-x-3 group">
      <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center transform group-hover:rotate-12 transition-transform shadow-lg shadow-indigo-100 dark:shadow-none">
        <i class="fa-solid fa-brain text-white text-xl"></i>
      </div>
      <span class="text-xl font-black tracking-tighter text-gray-900 dark:text-white">{{ .Site.Title }}</span>
    </a>
  </div>

  <nav class="flex-1 px-4 space-y-1">
    {{ range .Site.Menus.app }}
    <a href="{{ .URL }}" class="flex items-center space-x-3 px-4 py-3.5 rounded-2xl text-sm font-bold transition-all group {{ if $.IsMenuCurrent "app" . }} bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 {{ else }} text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-white {{ end }}">
      <div class="w-8 h-8 rounded-lg {{ if $.IsMenuCurrent "app" . }} bg-white dark:bg-indigo-900/50 shadow-sm {{ else }} bg-gray-50 dark:bg-gray-900 group-hover:bg-white dark:group-hover:bg-gray-800 {{ end }} flex items-center justify-center transition-colors">
        <i class="{{ .Pre }} {{ if $.IsMenuCurrent "app" . }} text-indigo-600 dark:text-indigo-400 {{ else }} text-gray-400 dark:text-gray-500 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 {{ end }}"></i>
      </div>
      <span>{{ .Name }}</span>
    </a>
    {{ end }}
  </nav>

  <div class="p-4 border-t border-gray-100 dark:border-gray-800">
    <div class="p-4 rounded-3xl bg-gray-50 dark:bg-gray-800/50 border border-gray-100 dark:border-gray-800">
      <div class="flex items-center space-x-3 mb-4">
        <div id="sidebar-avatar-container" class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center text-white font-black text-lg shadow-lg shadow-indigo-100 dark:shadow-none overflow-hidden">
          <span id="sidebar-user-initial">U</span>
        </div>
        <div class="min-w-0 flex-1">
          <p id="sidebar-user-name" class="text-sm font-black text-gray-900 dark:text-white truncate">User</p>
          <p id="sidebar-user-plan" class="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 uppercase tracking-widest">Free Plan</p>
        </div>
      </div>
      <button onclick="window.handleLogout()" class="w-full py-3 rounded-2xl bg-white dark:bg-gray-900 text-gray-600 dark:text-gray-400 text-xs font-black border border-gray-100 dark:border-gray-700 hover:bg-red-50 dark:hover:bg-red-950/30 hover:text-red-600 dark:hover:text-red-400 hover:border-red-100 dark:hover:border-red-900/30 transition-all">
        {{ $labels.logout }}
      </button>
    </div>
  </div>
</aside>

<script>
  // Enhanced script to update sidebar info securely
  document.addEventListener('DOMContentLoaded', () => {
    try {
      const userStr = localStorage.getItem('mindfull_session');
      if (!userStr) return;
      const user = JSON.parse(userStr);
      if (user) {
        const sidebarName = document.getElementById('sidebar-user-name');
        const sidebarInitial = document.getElementById('sidebar-user-initial');
        const sidebarPlan = document.getElementById('sidebar-user-plan');
        const avatarContainer = document.getElementById('sidebar-avatar-container');
        
        if (sidebarName) sidebarName.textContent = user.name || user.email;
        if (sidebarPlan) sidebarPlan.textContent = (user.plan || 'Free') + ' Plan';
        
        if (user.avatar && avatarContainer) {
          // Security: Validate avatar URL. Block SVG to prevent XSS.
          if (typeof user.avatar === 'string') {
             const isSafeData = user.avatar.startsWith('data:image/') && !user.avatar.includes('svg+xml');
             const isRelative = user.avatar.startsWith('/') && !user.avatar.startsWith('//');
             
             if (isSafeData || isRelative) {
                // Clear safely
                while (avatarContainer.firstChild) {
                  avatarContainer.removeChild(avatarContainer.firstChild);
                }
                const img = document.createElement('img');
                img.src = user.avatar;
                img.className = 'h-full w-full object-cover';
                img.loading = 'lazy';
                img.decoding = 'async';
                img.alt = user.name || 'User Avatar';
                avatarContainer.appendChild(img);
             }
          }
        } else if (sidebarInitial) {
          sidebarInitial.textContent = (user.name || user.email).charAt(0).toUpperCase();
        }
      }
    } catch (e) {
      console.error('Sidebar UI update failed', e);
    }
  });
</script>
