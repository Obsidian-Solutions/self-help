{{ $id := .Get "id" | default (now.UnixNano | string) }}
<div class="my-10 js-audio-player" id="player-{{ $id }}" data-audio-id="{{ $id }}">
  <div class="premium-card overflow-hidden border-indigo-100/50 dark:border-indigo-800/50 shadow-indigo-500/5">
    <div class="flex flex-col md:flex-row">
      <!-- Player Icon/Visual -->
      <div class="w-full md:w-48 bg-indigo-50 dark:bg-indigo-950/30 flex items-center justify-center p-8 border-b md:border-b-0 md:border-r border-indigo-100 dark:border-indigo-800 relative group/icon">
        <div class="w-20 h-20 bg-white dark:bg-gray-800 rounded-[2rem] shadow-xl flex items-center justify-center text-indigo-600 transition-all duration-500 group-hover/icon:scale-110 group-hover/icon:rotate-3">
          <i class="fa-solid fa-headphones text-3xl"></i>
        </div>
        <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/5 to-purple-500/5 opacity-0 group-hover/icon:opacity-100 transition-opacity"></div>
      </div>

      <!-- Main Controls -->
      <div class="flex-1 p-6 md:p-8 flex flex-col justify-between min-w-0 bg-white dark:bg-gray-900">
        <div>
          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
            <div class="min-w-0">
              <h4 class="text-xl font-black text-gray-900 dark:text-white mb-1 truncate tracking-tight">{{ .Get "title" | default "Guided Audio Session" }}</h4>
              <div class="flex items-center gap-3">
                <span class="text-[10px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-[0.2em] bg-indigo-50 dark:bg-indigo-900/30 px-2 py-0.5 rounded">Audio Lesson</span>
                <span class="w-px h-3 bg-gray-200 dark:bg-gray-700"></span>
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest js-audio-duration-label">{{ .Get "duration" | default "Loading..." }}</span>
              </div>
            </div>
            
            <div class="flex items-center gap-2">
              <!-- Speed Dropdown -->
              <div class="flex items-center bg-gray-50 dark:bg-gray-800/50 rounded-xl px-3 py-1.5 border border-gray-100 dark:border-gray-700 group/speed hover:border-indigo-200 transition-colors">
                <i class="fa-solid fa-gauge-high text-[10px] text-gray-400 group-hover/speed:text-indigo-600 transition-colors"></i>
                <select onchange="window.setAudioSpeed('{{ $id }}', this.value)" class="bg-transparent border-none text-[10px] font-black uppercase tracking-widest text-gray-500 focus:ring-0 cursor-pointer hover:text-indigo-600 transition-colors outline-none appearance-none pr-4">
                  <option value="1">1.0x</option>
                  <option value="1.25">1.25x</option>
                  <option value="1.5">1.5x</option>
                  <option value="2">2.0x</option>
                </select>
              </div>

              <!-- Volume Control -->
              <div class="flex items-center gap-3 bg-gray-50 dark:bg-gray-800/50 rounded-xl px-3 py-1.5 border border-gray-100 dark:border-gray-700 group/vol hover:border-indigo-200 transition-colors">
                <button onclick="window.toggleMute('{{ $id }}')" class="text-gray-400 hover:text-indigo-600 transition-colors js-mute-btn">
                  <i class="fa-solid fa-volume-high text-[10px]"></i>
                </button>
                <input 
                  type="range" 
                  min="0" 
                  max="1" 
                  step="0.1" 
                  value="1" 
                  class="w-16 h-1 bg-gray-200 dark:bg-gray-700 rounded-full appearance-none cursor-pointer accent-indigo-600 js-volume-slider"
                  oninput="window.setVolume('{{ $id }}', this.value)"
                >
              </div>
            </div>
          </div>

          <audio id="raw-audio-{{ $id }}" src="{{ .Get "src" }}" class="hidden" preload="auto"></audio>
          
          <div class="space-y-6">
            <!-- Scrubber -->
            <div class="relative h-6 flex items-center group/scrubber">
              <input 
                type="range" 
                value="0" 
                step="0.1" 
                min="0" 
                max="100" 
                class="w-full h-1.5 bg-gray-100 dark:bg-gray-800 rounded-full appearance-none cursor-pointer accent-indigo-600 js-audio-scrubber relative z-10"
                oninput="window.seekAudio('{{ $id }}', this.value)"
              >
              <div class="absolute left-0 top-1/2 -translate-y-1/2 h-1.5 bg-indigo-600/10 rounded-full w-full pointer-events-none"></div>
            </div>

            <div class="flex items-center gap-8">
              <button onclick="window.toggleAudio('{{ $id }}')" class="w-16 h-16 rounded-[1.5rem] bg-indigo-600 text-white flex items-center justify-center hover:scale-105 transition-all shadow-xl shadow-indigo-500/20 active:scale-95 js-play-btn disabled:opacity-50" disabled>
                <i class="fa-solid fa-spinner fa-spin text-xl"></i>
              </button>

              <div class="flex-1 flex items-center justify-between">
                <div class="flex flex-col">
                  <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Elapsed</span>
                  <span class="text-sm font-black text-gray-900 dark:text-white font-mono js-current-time">0:00</span>
                </div>
                
                <div class="flex items-center gap-4 bg-gray-50 dark:bg-gray-800/50 px-6 py-3 rounded-2xl border border-gray-100 dark:border-gray-700">
                  <button onclick="window.skipAudio('{{ $id }}', -10)" class="text-gray-400 hover:text-indigo-600 transition-all hover:scale-110 active:scale-90" title="Back 10s">
                    <i class="fa-solid fa-rotate-left text-lg"></i>
                  </button>
                  <span class="w-px h-4 bg-gray-200 dark:bg-gray-700 mx-2"></span>
                  <button onclick="window.skipAudio('{{ $id }}', 10)" class="text-gray-400 hover:text-indigo-600 transition-all hover:scale-110 active:scale-90" title="Forward 10s">
                    <i class="fa-solid fa-rotate-right text-lg"></i>
                  </button>
                </div>

                <div class="flex flex-col text-right">
                  <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Total</span>
                  <span class="text-sm font-black text-gray-400 font-mono js-total-time">0:00</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    function formatTime(seconds) {
      if (isNaN(seconds) || seconds === Infinity) return "0:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function updatePlayIcon(id, state) {
      const player = document.getElementById('player-' + id);
      if (!player) return;
      const btn = player.querySelector('.js-play-btn');
      if (state === 'loading') {
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xl"></i>';
      } else if (state === 'playing') {
        btn.innerHTML = '<i class="fa-solid fa-pause text-xl"></i>';
      } else {
        btn.innerHTML = '<i class="fa-solid fa-play text-xl ml-1"></i>';
      }
    }

    window.toggleAudio = function(id) {
      const player = document.getElementById('player-' + id);
      const audio = player.querySelector('audio');

      if (audio.paused) {
        document.querySelectorAll('audio').forEach(a => {
          if (a !== audio) {
            a.pause();
            const p = a.closest('.js-audio-player');
            if (p) {
              updatePlayIcon(p.dataset.audioId, 'paused');
            }
          }
        });

        audio.play().catch(e => {
          if(window.showToast) window.showToast("Playback blocked by browser.", "error");
        });
        updatePlayIcon(id, 'playing');
      } else {
        audio.pause();
        updatePlayIcon(id, 'paused');
      }
    };

    window.seekAudio = function(id, value) {
      const player = document.getElementById('player-' + id);
      const audio = player.querySelector('audio');
      if (audio.duration) {
        const wasPlaying = !audio.paused;
        audio.currentTime = (value / 100) * audio.duration;
        if (wasPlaying) audio.play();
      }
    };

    window.skipAudio = function(id, seconds) {
      const player = document.getElementById('player-' + id);
      const audio = player.querySelector('audio');
      const wasPlaying = !audio.paused;
      let newTime = audio.currentTime + seconds;
      if (newTime < 0) newTime = 0;
      if (audio.duration && newTime > audio.duration) newTime = audio.duration;
      audio.currentTime = newTime;
      if (wasPlaying) audio.play();
    };

    window.setAudioSpeed = function(id, val) {
      const player = document.getElementById('player-' + id);
      const audio = player.querySelector('audio');
      audio.playbackRate = parseFloat(val);
    };

    window.setVolume = function(id, val) {
      const player = document.getElementById('player-' + id);
      const audio = player.querySelector('audio');
      const muteBtn = player.querySelector('.js-mute-btn i');
      audio.volume = val;
      if (val == 0) {
        muteBtn.className = 'fa-solid fa-volume-xmark text-[10px]';
      } else if (val < 0.5) {
        muteBtn.className = 'fa-solid fa-volume-low text-[10px]';
      } else {
        muteBtn.className = 'fa-solid fa-volume-high text-[10px]';
      }
    };

    window.toggleMute = function(id) {
      const player = document.getElementById('player-' + id);
      const audio = player.querySelector('audio');
      const slider = player.querySelector('.js-volume-slider');
      if (audio.volume > 0) {
        player.dataset.lastVol = audio.volume;
        window.setVolume(id, 0);
        slider.value = 0;
      } else {
        const last = player.dataset.lastVol || 1;
        window.setVolume(id, last);
        slider.value = last;
      }
    };

    const initPlayer = (player) => {
      const id = player.getAttribute('data-audio-id');
      const audio = player.querySelector('audio');
      const scrubber = player.querySelector('.js-audio-scrubber');
      const currentTimeEl = player.querySelector('.js-current-time');
      const totalTimeEl = player.querySelector('.js-total-time');
      const durationLabel = player.querySelector('.js-audio-duration-label');
      const playBtn = player.querySelector('.js-play-btn');

      const setReady = () => {
        playBtn.disabled = false;
        updatePlayIcon(id, audio.paused ? 'paused' : 'playing');
        const time = formatTime(audio.duration);
        totalTimeEl.textContent = time;
        if (durationLabel) durationLabel.textContent = time;
      };

      audio.addEventListener('waiting', () => updatePlayIcon(id, 'loading'));
      audio.addEventListener('stalled', () => updatePlayIcon(id, 'loading'));
      audio.addEventListener('playing', () => updatePlayIcon(id, 'playing'));
      audio.addEventListener('pause', () => updatePlayIcon(id, 'paused'));

      if (audio.readyState >= 1) {
        setReady();
      } else {
        audio.addEventListener('loadedmetadata', setReady);
      }

      audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        const pct = (audio.currentTime / audio.duration) * 100;
        scrubber.value = pct;
        currentTimeEl.textContent = formatTime(audio.currentTime);
        scrubber.style.background = `linear-gradient(to right, #4f46e5 ${pct}%, #e5e7eb ${pct}%)`;
      });

      audio.addEventListener('ended', () => {
        updatePlayIcon(id, 'paused');
        scrubber.value = 0;
        scrubber.style.background = '';
      });

      audio.addEventListener('error', () => {
        playBtn.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-xl"></i>';
      });
    };

    document.querySelectorAll('.js-audio-player').forEach(initPlayer);
  })();
</script>
