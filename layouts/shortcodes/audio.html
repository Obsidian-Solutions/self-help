<div class="my-8 premium-card p-6 md:p-8 flex flex-col md:flex-row items-center gap-6 group">
  <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center text-white shadow-lg group-hover:rotate-6 transition-transform">
    <i class="fa-solid fa-headphones text-3xl"></i>
  </div>
  
  <div class="flex-1 w-full">
    <div class="mb-4">
      <h4 class="text-lg font-black text-gray-900 dark:text-white mb-1">{{ .Get "title" | default "Guided Meditation" }}</h4>
      <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">{{ .Get "duration" | default "5:00" }} &middot; Local Session</p>
    </div>

    <audio id="audio-{{ .Get "id" | default "meditation" }}" src="{{ .Get "src" }}" class="hidden"></audio>
    
    <div class="flex items-center gap-4">
      <button onclick="window.toggleAudio('{{ .Get "id" | default "meditation" }}')" id="play-btn-{{ .Get "id" | default "meditation" }}" class="w-12 h-12 rounded-2xl bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all active:scale-90">
        <i class="fa-solid fa-play ml-1"></i>
      </button>
      
      <div class="flex-1 h-2 bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden relative">
        <div id="progress-{{ .Get "id" | default "meditation" }}" class="absolute top-0 left-0 h-full bg-indigo-600 w-0 transition-all duration-300"></div>
      </div>
    </div>
  </div>
</div>

<script>
  window.toggleAudio = function(id) {
    const audio = document.getElementById('audio-' + id);
    const btn = document.getElementById('play-btn-' + id);
    const progress = document.getElementById('progress-' + id);
    const icon = btn.querySelector('i');

    if (audio.paused) {
      audio.play();
      icon.classList.replace('fa-play', 'fa-pause');
      icon.classList.remove('ml-1');
    } else {
      audio.pause();
      icon.classList.replace('fa-pause', 'fa-play');
      icon.classList.add('ml-1');
    }

    audio.ontimeupdate = () => {
      const pct = (audio.currentTime / audio.duration) * 100;
      progress.style.width = pct + '%';
    };

    audio.onended = () => {
      icon.classList.replace('fa-pause', 'fa-play');
      icon.classList.add('ml-1');
      progress.style.width = '0%';
    };
  };
</script>
