<div class="space-y-12 my-10">
  {{ range site.Data.cookies.categories }}
  <div class="bg-white dark:bg-gray-800 rounded-3xl border border-gray-100 dark:border-gray-700 overflow-hidden shadow-sm">
    <div class="p-6 border-b border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-900/50">
      <h3 class="text-xl font-black text-gray-900 dark:text-white tracking-tight">{{ .name }}</h3>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">{{ .description }}</p>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left text-sm">
        <thead class="bg-gray-50 dark:bg-gray-900/50 border-b border-gray-100 dark:border-gray-700">
          <tr>
            <th class="px-6 py-4 font-black uppercase tracking-widest text-[10px] text-gray-400">Cookie Name</th>
            <th class="px-6 py-4 font-black uppercase tracking-widest text-[10px] text-gray-400">Purpose</th>
            <th class="px-6 py-4 font-black uppercase tracking-widest text-[10px] text-gray-400">Type</th>
            <th class="px-6 py-4 font-black uppercase tracking-widest text-[10px] text-gray-400">Duration</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50 dark:divide-gray-700">
          {{ range .items }}
          <tr class="hover:bg-gray-50/50 dark:hover:bg-gray-900/20 transition-colors">
            <td class="px-6 py-4 font-bold text-indigo-600 dark:text-indigo-400">{{ .name }}</td>
            <td class="px-6 py-4 text-gray-600 dark:text-gray-300 leading-relaxed">{{ .purpose }}</td>
            <td class="px-6 py-4"><span class="px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-[10px] font-black uppercase">{{ .type }}</span></td>
            <td class="px-6 py-4 text-gray-500 dark:text-gray-400 font-medium">{{ .expiry }}</td>
          </tr>
          {{ end }}
        </tbody>
      </table>
    </div>
  </div>
  {{ end }}
</div>
