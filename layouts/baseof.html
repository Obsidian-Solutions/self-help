<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body class="bg-gray-50 text-neutral font-sans antialiased dark:bg-gray-900 dark:text-gray-200">
  <div class="min-h-screen flex flex-col">
    <header class="bg-white shadow-sm dark:bg-gray-800 dark:border-gray-700">
      {{ partial "header.html" . }}
    </header>
    <main class="flex-grow">
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="bg-gray-800 text-white mt-auto dark:bg-gray-950">
      {{ partial "footer.html" . }}
    </footer>
    <!-- Global Modals -->
    {{ partial "modals/login-modal.html" . }}
    {{ partial "modals/signup-modal.html" . }}
    {{ partial "toast.html" . }}
  </div>
  
  <script>
    // Enhanced modal functions for forms
    window.openModal = function(modalId) {
      const modal = document.getElementById(modalId);
      if (modal) {
        modal.style.display = '';
        modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
      }
    };

    window.closeModal = function(modalId) {
      const modal = document.getElementById(modalId);
      if (modal) {
        modal.classList.add('hidden');
        modal.style.display = 'none';
        document.body.style.overflow = '';
      }
    };

    window.switchModal = function(closeId, openId) {
      window.closeModal(closeId);
      window.openModal(openId);
    };

    // Handle modal backdrop clicks
    document.addEventListener('click', function(e) {
      if (e.target.hasAttribute('data-modal-backdrop') && e.target === e.currentTarget) {
        const modalId = e.target.id;
        window.closeModal(modalId);
      }
    });

    // Handle escape key for modals
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        const openModals = document.querySelectorAll('[data-modal-backdrop]:not(.hidden)');
        openModals.forEach(modal => {
          window.closeModal(modal.id);
        });
      }
    });
  </script>
</body>
</html>
