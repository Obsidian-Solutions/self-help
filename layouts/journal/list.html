{{ define "main" }}
<div class="flex flex-col md:flex-row bg-gray-50 dark:bg-gray-900">
  <!-- Sidebar -->
  <aside class="w-full md:w-64 md:flex-shrink-0 border-r border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
    <div class="sticky top-0 p-4 md:p-6">
      {{ partial "dashboard/sidebar.html" . }}
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 min-w-0 p-4 md:p-8 lg:p-12">
    <div class="max-w-4xl mx-auto">
      <div class="md:flex md:items-center md:justify-between mb-10">
          <div class="flex-1 min-w-0">
            <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white sm:text-4xl">
              {{ .Title }}
            </h1>
            <p class="mt-2 text-xl text-gray-600 dark:text-gray-400">
              {{ .Params.description }}
            </p>
          </div>
        </div>

        <div class="bg-white dark:bg-gray-800 shadow sm:rounded-lg">
          <div class="px-4 py-5 sm:p-6">
            <div class="space-y-6">
              <div>
                <label
                  for="journal-title"
                  class="block text-sm font-medium text-gray-700 dark:text-gray-300"
                  >Title</label
                >
                <div class="mt-1">
                  <input
                    type="text"
                    name="journal-title"
                    id="journal-title"
                    class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                    placeholder="Reflections on today..."
                  />
                </div>
              </div>

              <div>
                <label
                  for="journal-content"
                  class="block text-sm font-medium text-gray-700 dark:text-gray-300"
                  >Entry</label
                >
                <div class="mt-1">
                  <textarea
                    id="journal-content"
                    name="journal-content"
                    rows="10"
                    class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border border-gray-300 rounded-md p-3 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                    placeholder="Write whatever is on your mind..."
                  ></textarea>
                </div>
              </div>

              <div class="flex justify-end">
                <button onclick="saveEntry()" class="btn btn-primary">Save Entry</button>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-8">
          <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-white mb-4">
            Past Entries
          </h3>
          <div id="entries-list" class="space-y-4">
            <!-- Entries will be injected here via JS -->
            <p class="text-gray-500 dark:text-gray-400 italic">No entries yet.</p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
  function saveEntry() {
    const title = document.getElementById('journal-title').value;
    const content = document.getElementById('journal-content').value;
    const date = new Date().toLocaleDateString();

    if (!title || !content) {
      if (window.showToast) {
        window.showToast('Please fill in both fields.', 'error');
      } else {
        alert('Please fill in both fields.');
      }
      return;
    }

    const entry = { title, content, date, id: Date.now() };
    const entries = JSON.parse(localStorage.getItem('journalEntries') || '[]');
    entries.unshift(entry);
    localStorage.setItem('journalEntries', JSON.stringify(entries));

    document.getElementById('journal-title').value = '';
    document.getElementById('journal-content').value = '';
    renderEntries();
    if (window.showToast) window.showToast('Journal entry saved!', 'success');
    if (window.refreshAchievements) window.refreshAchievements();
  }

  function renderEntries() {
    const entries = JSON.parse(localStorage.getItem('journalEntries') || '[]');
    const container = document.getElementById('entries-list');

    if (entries.length === 0) {
      container.innerHTML =
        '<p class="text-gray-500 dark:text-gray-400 italic">No entries yet.</p>';
      return;
    }

    container.innerHTML = ''; // Clear container

    entries.forEach(entry => {
      const entryDiv = document.createElement('div');
      entryDiv.className = 'bg-white dark:bg-gray-800 shadow rounded-lg p-6';
      entryDiv.id = `entry-${entry.id}`;

      const headerDiv = document.createElement('div');
      headerDiv.className = 'flex justify-between items-center mb-2';

      const titleH4 = document.createElement('h4');
      titleH4.className = 'text-lg font-bold text-gray-900 dark:text-white';
      titleH4.id = `title-${entry.id}`;
      titleH4.textContent = entry.title;

      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'flex items-center space-x-2';

      const dateSpan = document.createElement('span');
      dateSpan.className = 'text-xs text-gray-500 dark:text-gray-400 mr-2';
      dateSpan.textContent = entry.date;

      const editBtn = document.createElement('button');
      editBtn.className =
        'text-indigo-600 hover:text-indigo-900 dark:text-indigo-400 dark:hover:text-indigo-300 text-xs font-medium';
      editBtn.textContent = 'Edit';
      editBtn.onclick = () => editEntry(entry.id);

      const deleteBtn = document.createElement('button');
      deleteBtn.className =
        'text-red-600 hover:text-red-900 dark:text-red-400 dark:hover:text-red-300 text-xs font-medium';
      deleteBtn.textContent = 'Delete';
      deleteBtn.onclick = () => deleteEntry(entry.id);

      actionsDiv.appendChild(dateSpan);
      actionsDiv.appendChild(editBtn);
      actionsDiv.appendChild(deleteBtn);

      headerDiv.appendChild(titleH4);
      headerDiv.appendChild(actionsDiv);

      const contentP = document.createElement('p');
      contentP.className = 'text-gray-600 dark:text-gray-300 whitespace-pre-wrap';
      contentP.id = `content-${entry.id}`;
      contentP.textContent = entry.content;

      const editFormDiv = document.createElement('div');
      editFormDiv.id = `edit-form-${entry.id}`;
      editFormDiv.style.display = 'none';
      editFormDiv.className = 'mt-4 space-y-4 pt-4 border-t border-gray-100 dark:border-gray-700';

      const editTitleInput = document.createElement('input');
      editTitleInput.type = 'text';
      editTitleInput.id = `edit-title-${entry.id}`;
      editTitleInput.className =
        'block w-full sm:text-sm border-gray-300 rounded-md p-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-white';
      editTitleInput.value = entry.title;

      const editContentTextarea = document.createElement('textarea');
      editContentTextarea.id = `edit-content-${entry.id}`;
      editContentTextarea.rows = 4;
      editContentTextarea.className =
        'block w-full sm:text-sm border border-gray-300 rounded-md p-3 dark:bg-gray-700 dark:border-gray-600 dark:text-white';
      editContentTextarea.textContent = entry.content;

      const editActionsDiv = document.createElement('div');
      editActionsDiv.className = 'flex justify-end space-x-2';

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'text-gray-500 hover:text-gray-700 text-xs font-medium';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.onclick = () => cancelEdit(entry.id);

      const updateBtn = document.createElement('button');
      updateBtn.className = 'bg-indigo-600 text-white px-3 py-1 rounded text-xs font-medium';
      updateBtn.textContent = 'Update';
      updateBtn.onclick = () => updateEntry(entry.id);

      editActionsDiv.appendChild(cancelBtn);
      editActionsDiv.appendChild(updateBtn);

      editFormDiv.appendChild(editTitleInput);
      editFormDiv.appendChild(editContentTextarea);
      editFormDiv.appendChild(editActionsDiv);

      entryDiv.appendChild(headerDiv);
      entryDiv.appendChild(contentP);
      entryDiv.appendChild(editFormDiv);

      container.appendChild(entryDiv);
    });
  }

  function deleteEntry(id) {
    const performDelete = () => {
      const entries = JSON.parse(localStorage.getItem('journalEntries') || '[]');
      const filtered = entries.filter(e => e.id !== id);
      localStorage.setItem('journalEntries', JSON.stringify(filtered));
      renderEntries();
      if (window.showToast) window.showToast('Entry deleted.', 'info');
      if (window.refreshAchievements) window.refreshAchievements();
    };

    if (window.showConfirm) {
      window.showConfirm(
        'Delete Entry',
        'Are you sure you want to delete this journal entry?',
        performDelete,
      );
    } else if (confirm('Are you sure you want to delete this entry?')) {
      performDelete();
    }
  }

  function editEntry(id) {
    document.getElementById(`title-${id}`).style.display = 'none';
    document.getElementById(`content-${id}`).style.display = 'none';
    document.getElementById(`edit-form-${id}`).style.display = 'block';
  }

  function cancelEdit(id) {
    document.getElementById(`title-${id}`).style.display = 'block';
    document.getElementById(`content-${id}`).style.display = 'block';
    document.getElementById(`edit-form-${id}`).style.display = 'none';
  }

  function updateEntry(id) {
    const newTitle = document.getElementById(`edit-title-${id}`).value;
    const newContent = document.getElementById(`edit-content-${id}`).value;

    if (!newTitle || !newContent) {
      if (window.showToast) window.showToast('Please fill in both fields.', 'error');
      return;
    }

    const entries = JSON.parse(localStorage.getItem('journalEntries') || '[]');
    const index = entries.findIndex(e => e.id === id);
    if (index !== -1) {
      entries[index].title = newTitle;
      entries[index].content = newContent;
      entries[index].date = new Date().toLocaleDateString() + ' (Edited)';
      localStorage.setItem('journalEntries', JSON.stringify(entries));
      if (window.showToast) window.showToast('Entry updated!', 'success');
      renderEntries();
    }
  }

  // Load entries on page load
  document.addEventListener('DOMContentLoaded', renderEntries);
</script>
{{ end }}
