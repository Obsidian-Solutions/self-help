{{ define "main" }}
{{ $labels := site.Data.labels.auth_modals.login }}
<div class="min-h-screen bg-gray-50 dark:bg-gray-900 flex flex-col justify-center py-12 sm:px-6 lg:px-8 overflow-hidden">
  <div class="sm:mx-auto sm:w-full sm:max-w-md animate-in fade-in slide-in-from-top-4 duration-700">
    <a href="{{ relURL "/" }}" class="flex justify-center mb-6">
      <span class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-2xl font-black shadow-xl shadow-indigo-200 dark:shadow-none">{{ site.Data.labels.site.logo_text }}</span>
    </a>
    <h2 class="text-center text-3xl font-black text-gray-900 dark:text-white tracking-tight">{{ $labels.title }}</h2>
    <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400 font-medium">
      {{ $labels.footer_text }}
      <a href="{{ "/signup/" | relURL }}" class="font-bold text-indigo-600 hover:text-indigo-500 dark:text-indigo-400">{{ $labels.footer_link }}</a>
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md animate-in fade-in slide-in-from-bottom-4 duration-700">
    <div class="bg-white dark:bg-gray-800 py-10 px-6 shadow-2xl shadow-gray-200/50 dark:shadow-none sm:rounded-[2.5rem] sm:px-12 border border-gray-100 dark:border-gray-700">
      <form class="space-y-6" onsubmit="window.handleLogin(event)">
        <div>
          <label for="login-email" class="block text-[10px] font-black uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-3">{{ $labels.email_label }}</label>
          <input id="login-email" name="email" type="email" required class="block w-full font-bold border-gray-200 rounded-2xl p-4 border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="{{ $labels.email_placeholder }}">
        </div>

        <div>
          <label for="login-password" class="block text-[10px] font-black uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-3">{{ $labels.password_label }}</label>
          <input id="login-password" name="password" type="password" required class="block w-full font-bold border-gray-200 rounded-2xl p-4 border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="{{ $labels.password_placeholder }}">
        </div>

        <div>
          <button type="submit" class="w-full flex justify-center py-4 px-4 border border-transparent rounded-2xl shadow-lg shadow-indigo-100 dark:shadow-none text-sm font-black text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
            {{ $labels.submit_btn }}
          </button>
        </div>
      </form>

      <div class="mt-8">
        <div class="relative">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100 dark:border-gray-700"></div></div>
          <div class="relative flex justify-center text-sm font-bold"><span class="px-4 bg-white dark:bg-gray-800 text-gray-400 uppercase tracking-widest text-[10px]">{{ $labels.sso_divider }}</span></div>
        </div>

        <div class="mt-8 space-y-3">
          <button onclick="window.handleGoogleLogin()" class="w-full inline-flex items-center justify-center py-3 px-4 border border-gray-300 dark:border-gray-600 rounded-2xl bg-white dark:bg-gray-700 text-sm font-bold text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600 transition-all shadow-sm">
            <svg class="w-5 h-5 mr-3" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
            Continue with Google
          </button>
          
          <div class="grid grid-cols-2 gap-3">
            <button onclick="window.handleGithubLogin()" class="inline-flex items-center justify-center py-3 px-4 border border-gray-300 dark:border-gray-600 rounded-2xl bg-white dark:bg-gray-700 text-sm font-bold text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600 transition-all shadow-sm">
              <i class="fa-brands fa-github text-lg mr-2"></i>
              GitHub
            </button>
            <button onclick="window.handleDemoLogin()" class="inline-flex items-center justify-center py-3 px-4 border border-gray-300 dark:border-gray-600 rounded-2xl bg-white dark:bg-gray-700 text-sm font-bold text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-all shadow-sm">
              <i class="fa-solid fa-user-astronaut text-indigo-500 text-lg mr-2"></i>
              Demo
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{{ end }}
