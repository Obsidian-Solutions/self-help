<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "shared/head.html" . }}
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body class="bg-gray-50 text-neutral font-sans antialiased dark:bg-gray-900 dark:text-gray-200">
  <div class="min-h-screen flex flex-col md:flex-row">
    <!-- Sidebar -->
    <aside class="w-full md:w-64 md:flex-shrink-0 border-r border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
      <div class="sticky top-0 p-4 md:p-6">
        {{ partial "app/sidebar.html" . }}
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 min-w-0 p-4 md:p-8 lg:p-12 overflow-y-auto">
      <div class="max-w-7xl mx-auto">
        {{ block "main" . }}{{ end }}
      </div>
    </main>
  </div>

  <!-- Global Modals (App Version) -->
  {{ partial "auth/confirm-modal.html" . }}
  {{ partial "shared/toast.html" . }}

  <script>
    // Simple modal logic for confirm
    window.openModal = function(id) { document.getElementById(id)?.classList.remove('hidden'); };
    window.closeModal = function(id) { document.getElementById(id)?.classList.add('hidden'); };
  </script>
</body>
</html>
