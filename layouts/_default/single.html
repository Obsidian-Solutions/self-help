{{ define "main" }}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <div class="mb-8 text-center">
    <span
      class="text-indigo-600 dark:text-indigo-400 font-semibold tracking-wide uppercase text-sm"
    >
      {{ if .Params.category }}{{ .Params.category }}{{ else }}Blog Post{{ end }}
    </span>
    <h1
      class="mt-2 text-3xl leading-8 font-extrabold tracking-tight text-gray-900 dark:text-white sm:text-4xl"
    >
      {{ .Title }}
    </h1>
    <div class="mt-4 flex items-center justify-center text-gray-500 dark:text-gray-400 text-sm">
      <span>{{ .Date.Format "January 2, 2006" }}</span>
      <span class="mx-2">&middot;</span>
      <span>{{ .ReadingTime }} min read</span>
    </div>
  </div>

  {{ if .Params.image }}
  <div class="relative h-64 sm:h-96 w-full mb-12">
    <img
      class="w-full h-full object-cover rounded-xl shadow-lg"
      src="{{ .Params.image }}"
      alt="{{ .Title }}"
    />
  </div>
  {{ end }}

  <div
    class="prose prose-indigo dark:prose-invert prose-lg mx-auto text-gray-600 dark:text-gray-300"
  >
    {{ .Content }}
  </div>

  <div class="mt-12 border-t border-gray-200 dark:border-gray-700 pt-8 text-center">
    <a
      href="/posts"
      class="text-indigo-600 dark:text-indigo-400 font-medium hover:text-indigo-500 dark:hover:text-indigo-300"
      >&larr; Back to all posts</a
    >
  </div>
</div>
{{ end }}
