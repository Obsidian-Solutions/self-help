{{ define "main" }}
{{ $labels := site.Data.labels.contact }}
<div class="py-12 sm:py-24 bg-white dark:bg-gray-900 animate-in fade-in slide-in-from-bottom-4 duration-700">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
      <div>
        <h1 class="text-5xl font-black text-gray-900 dark:text-white tracking-tighter mb-6">{{ .Title }}</h1>
        <p class="text-xl text-gray-500 dark:text-gray-400 font-medium mb-10 leading-relaxed">{{ .Params.description }}</p>
        
        <div class="space-y-8">
          {{ range .Params.contact_methods }}
          <div class="flex items-start gap-6 group">
            <div class="flex-shrink-0 w-12 h-12 bg-indigo-50 dark:bg-indigo-900/30 rounded-2xl flex items-center justify-center text-indigo-600 dark:text-indigo-400 group-hover:scale-110 transition-transform">
              {{ if eq .icon "mail" }}
              <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              {{ else if eq .icon "phone" }}
              <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 011.94.86l-.85 3.85a1 1 0 01-.11.27l-.46.46a9 9 0 003.85 3.85l.46-.46a1 1 0 01.27-.11l3.85-.85a1 1 0 01.86 1.94V19a2 2 0 01-2 2h-1.06a1 1 0 01-1.06-.88 15.003 15.003 0 01-14.08-14.08A1 1 0 015 3h1.06z"/></svg>
              {{ else }}
              <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              {{ end }}
            </div>
            <div>
              <h4 class="text-sm font-black text-gray-900 dark:text-white uppercase tracking-widest mb-1">{{ .label }}</h4>
              <p class="text-gray-500 dark:text-gray-400 font-medium">{{ .value }}</p>
            </div>
          </div>
          {{ end }}
        </div>
      </div>

      <div class="bg-gray-50 dark:bg-gray-800 p-8 sm:p-12 rounded-[3rem] border border-gray-100 dark:border-gray-700 shadow-2xl shadow-gray-200/50 dark:shadow-none">
        <form action="#" method="POST" class="grid grid-cols-1 gap-y-6">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
              <label for="first-name" class="block text-[10px] font-black uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-3">{{ $labels.labels.first_name }}</label>
              <input type="text" id="first-name" name="first-name" required class="block w-full font-bold border-gray-200 rounded-2xl p-4 border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="{{ $labels.placeholders.first_name }}">
            </div>
            <div>
              <label for="last-name" class="block text-[10px] font-black uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-3">{{ $labels.labels.last_name }}</label>
              <input type="text" id="last-name" name="last-name" required class="block w-full font-bold border-gray-200 rounded-2xl p-4 border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="{{ $labels.placeholders.last_name }}">
            </div>
          </div>
          <div>
            <label for="email" class="block text-[10px] font-black uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-3">{{ $labels.labels.email }}</label>
            <input type="email" id="email" name="email" required class="block w-full font-bold border-gray-200 rounded-2xl p-4 border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="{{ $labels.placeholders.email }}">
          </div>
          <div>
            <label for="message" class="block text-[10px] font-black uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-3">{{ $labels.labels.message }}</label>
            <textarea id="message" name="message" rows="4" required class="block w-full font-bold border-gray-200 rounded-2xl p-4 border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="{{ $labels.placeholders.message }}"></textarea>
          </div>
          <button type="submit" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-indigo-200 dark:shadow-none hover:bg-indigo-700 hover:-translate-y-1 transition-all">{{ $labels.labels.submit_btn }}</button>
        </form>
      </div>
    </div>
  </div>
</div>
{{ end }}
