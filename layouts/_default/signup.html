{{ define "main" }}
{{ $labels := site.Data.labels.auth_modals.signup }}
<div class="min-h-screen bg-gray-50 dark:bg-gray-900 flex flex-col justify-center py-12 sm:px-6 lg:px-8 overflow-hidden">
  <div class="sm:mx-auto sm:w-full sm:max-w-md animate-in fade-in slide-in-from-top-4 duration-700">
    <a href="{{ relURL "/" }}" class="flex justify-center mb-6">
      <span class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-2xl font-black shadow-xl shadow-indigo-200 dark:shadow-none">{{ site.Data.labels.site.logo_text }}</span>
    </a>
    <h2 class="text-center text-3xl font-black text-gray-900 dark:text-white tracking-tight">{{ $labels.title }}</h2>
    <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400 font-medium">
      {{ $labels.footer_text }}
      <a href="{{ "/login/" | relURL }}" class="font-bold text-indigo-600 hover:text-indigo-500 dark:text-indigo-400">{{ $labels.footer_link }}</a>
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md animate-in fade-in slide-in-from-bottom-4 duration-700">
    <div class="bg-white dark:bg-gray-800 py-10 px-6 shadow-2xl shadow-gray-200/50 dark:shadow-none sm:rounded-[2.5rem] sm:px-12 border border-gray-100 dark:border-gray-700">
      <form class="space-y-6" onsubmit="window.handleSignup(event)">
        <div>
          <label for="signup-name" class="block text-[10px] font-black uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-3">{{ $labels.name_label }}</label>
          <input id="signup-name" name="name" type="text" required class="block w-full font-bold border-gray-200 rounded-2xl p-4 border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="{{ $labels.name_placeholder }}">
        </div>

        <div>
          <label for="signup-email" class="block text-[10px] font-black uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-3">{{ $labels.email_label }}</label>
          <input id="signup-email" name="email" type="email" required class="block w-full font-bold border-gray-200 rounded-2xl p-4 border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="{{ $labels.email_placeholder }}">
        </div>

        <div>
          <label for="signup-password" class="block text-[10px] font-black uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-3">{{ $labels.password_label }}</label>
          <input id="signup-password" name="password" type="password" required class="block w-full font-bold border-gray-200 rounded-2xl p-4 border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="{{ $labels.password_placeholder }}">
        </div>

        <div>
          <button type="submit" class="w-full flex justify-center py-4 px-4 border border-transparent rounded-2xl shadow-lg shadow-indigo-100 dark:shadow-none text-sm font-black text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
            {{ $labels.submit_btn }}
          </button>
        </div>
      </form>

      <div class="mt-8">
        <div class="relative">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100 dark:border-gray-700"></div></div>
          <div class="relative flex justify-center text-sm font-bold"><span class="px-4 bg-white dark:bg-gray-800 text-gray-400 uppercase tracking-widest text-[10px]">{{ $labels.sso_divider }}</span></div>
        </div>

        <div class="mt-8">
          <button onclick="window.handleGoogleLogin()" class="w-full inline-flex justify-center py-4 px-4 border border-gray-100 dark:border-gray-700 rounded-2xl bg-white dark:bg-gray-800 text-sm font-bold text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-700 transition-all shadow-sm">
            <svg class="w-5 h-5 mr-3" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.18 1-.78 1.85-1.63 2.42v2.77h2.64c1.55-2.43 2.43-6.01 2.43-9.45Z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-2.64-2.77c-.73.49-1.66.78-2.64.78-2.03 0-3.74-1.37-4.35-3.22H3.88v2.13A10.996 10.996 0 0 0 12 23Z"/><path fill="currentColor" d="M7.65 15.13c-.15-.45-.24-.93-.24-1.43s.09-1.43.24-1.43V10.14H3.88c-.56 1.1-.88 2.34-.88 3.61s.32 2.51.88 3.61l3.77-2.13Z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-3.19 3.71-5.53 12-5.53Z"/></svg>
            {{ $labels.sso_google }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
{{ end }}
