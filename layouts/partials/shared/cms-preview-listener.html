{{ if or (eq (getenv "HUGO_ENV") "development") (hugo.IsServer) }}
<script>
  /**
   * MindFull CMS Storage-Link Sync v11.0
   * High-Reliability LocalStorage Bridge
   */
  (function() {
    const isPreview = window.location.search.includes('cms_preview=true') || window.location.pathname.endsWith('.cms.html');
    if (!isPreview) return;

    console.log("CMS SNIPPET: Storage Bridge Active.");

    // 1. Storage Listener (Content & Scroll)
    window.addEventListener('storage', (e) => {
      if (e.key === 'cms_preview_data') {
        const data = JSON.parse(e.newValue);
        const root = document.querySelector('.fidelity-content') || document.querySelector('.prose');
        const title = document.querySelector('.fidelity-title') || document.querySelector('h1');
        
        if (root && data.body) root.innerHTML = data.body;
        if (title && data.title) title.textContent = data.title;
        
        // Sync Theme
        if (data.theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }

      if (e.key === 'cms_preview_scroll') {
        const data = JSON.parse(e.newValue);
        const s = document.scrollingElement || document.documentElement;
        const max = s.scrollHeight - window.innerHeight;
        window.scrollTo({ top: data.perc * max, behavior: 'auto' });
      }
    });

    // 2. Report Scroll back to Parent
    window.addEventListener('scroll', () => {
      // Don't report if we are already syncing (prevent loop)
      const s = document.scrollingElement || document.documentElement;
      const max = s.scrollHeight - window.innerHeight;
      if (max <= 0) return;
      localStorage.setItem('cms_dashboard_scroll', JSON.stringify({ 
        perc: s.scrollTop / max,
        ts: Date.now() 
      }));
    }, { passive: true });

  })();
</script>
{{ end }}
