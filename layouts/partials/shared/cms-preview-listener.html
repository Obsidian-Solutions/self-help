{{ if or (eq (getenv "HUGO_ENV") "development") (hugo.IsServer) }}
<script>
  /**
   * MindFull CMS Robust Sync-Scroll Engine
   * Version: 2.0 (Industrial)
   */
  (function() {
    const urlParams = new URLSearchParams(window.location.search);
    if (!urlParams.has('cms_preview')) return;

    console.log("MindFull Preview Shell: Active and syncing...");
    
    // 1. Tag and Hide Site Chrome
    const style = document.createElement('style');
    style.textContent = `
      header, footer, nav, aside, 
      .engagement-bar, .related-posts, .community-discussion, 
      .tags-social-section, .mt-24.text-center, .mt-32,
      #loginModal, #signupModal, #confirmModal { 
        display: none !important; 
      }
      body { background-color: #f9fafb !important; }
      .dark body { background-color: #111827 !important; }
      main { padding: 0 !important; margin: 0 !important; }
      article { padding: 2rem !important; max-width: 100% !important; }
      * { scroll-behavior: auto !important; transition: none !important; }
    `;
    document.head.appendChild(style);

    // 2. Handshake Loop: Ensure the Control Tower knows we are ready
    const signalReady = () => {
      window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
    };
    
    signalReady();
    const readyInterval = setInterval(signalReady, 500); // Heartbeat until acknowledged

    // 3. Command Listener
    let scrollLock = false;
    window.addEventListener('message', function(event) {
      const data = event.data;
      
      if (data.type === 'IFRAME_READY_ACK') {
        clearInterval(readyInterval);
        console.log("MindFull Handshake: Established");
      }

      if (data.type === 'CMS_SYNC') {
        const contentArea = document.querySelector('.prose') || document.querySelector('article');
        const titleArea = document.querySelector('h1');
        if (contentArea && data.body) contentArea.innerHTML = data.body;
        if (titleArea && data.title) titleArea.textContent = data.title;
      }

      if (data.type === 'CMS_SCROLL') {
        scrollLock = true;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        window.scrollTo(0, data.percentage * maxScroll);
        setTimeout(() => { scrollLock = false; }, 50);
      }
    });

    // 4. Bi-directional Scroll Notification
    window.addEventListener('scroll', () => {
      if (scrollLock) return;
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      const percentage = window.scrollY / maxScroll;
      window.parent.postMessage({ type: 'IFRAME_SCROLL', percentage }, '*');
    });

  })();
</script>
{{ end }}
