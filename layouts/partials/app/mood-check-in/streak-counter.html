{{ $labels := site.Data.labels.streak_widget }}
<div class="bg-white dark:bg-gray-800 shadow-sm rounded-3xl p-6 border border-gray-100 dark:border-gray-700 h-full flex flex-col justify-between">
  <div>
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-xl font-black text-gray-900 dark:text-white tracking-tight">{{ $labels.title }}</h3>
      <span class="text-3xl">{{ $labels.emoji }}</span>
    </div>
    
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-indigo-50 dark:bg-indigo-950/30 rounded-2xl p-4 text-center">
        <div class="text-4xl font-bold text-indigo-600 dark:text-indigo-400" id="streak-counter-count">{{ $labels.no_data }}</div>
        <div class="text-[10px] font-black uppercase tracking-widest text-gray-400 mt-1">{{ $labels.days_label }}</div>
      </div>
      <div class="bg-purple-50 dark:bg-purple-950/30 rounded-2xl p-4 text-center">
        <div class="text-4xl font-bold text-purple-600 dark:text-purple-400" id="total-checkins-count">{{ $labels.no_data }}</div>
        <div class="text-[10px] font-black uppercase tracking-widest text-gray-400 mt-1">{{ $labels.total_label }}</div>
      </div>
    </div>
  </div>

  <div class="mt-8 pt-6 border-t border-gray-50 dark:border-gray-700">
    <p class="text-xs text-gray-500 dark:text-gray-400 leading-relaxed">
      <strong class="text-indigo-600 dark:text-indigo-400">{{ $labels.encouragement_bold }}</strong> {{ $labels.encouragement_text }}
    </p>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const streakData = JSON.parse(localStorage.getItem('moodStreak') || '{"count": 0}');
    const moodData = JSON.parse(localStorage.getItem('moodCheckins') || '{}');
    
    const streakEl = document.getElementById('streak-counter-count');
    const totalEl = document.getElementById('total-checkins-count');
    
    if (streakEl) streakEl.textContent = streakData.count || 0;
    if (totalEl) totalEl.textContent = Object.keys(moodData).length || 0;
  });
</script>
