# ============================================================================
# Hugo Configuration - MindFull Theme
# ============================================================================

baseURL = 'https://obsidian-solutions.github.io/self-help/'
languageCode = 'en-US'
title = 'MindFull'
description = 'Science-backed CBT tools and expert guidance.'
relativeURLs = true
canonifyURLs = true

[params]
  author = 'MindFull Team'
  cms_url = 'http://localhost:3000'

# Output Formats
[outputFormats]
  [outputFormats.CMS]
    name = "CMS"
    baseName = "index"
    path = ""
    mediaType = "text/html"
    isHTML = true
    fileSuffix = ".snippet"

[outputs]
  home = ['HTML']
  page = ['HTML', 'CMS']
  section = ['HTML', 'CMS']

[taxonomies]
  category = 'categories'
  tag = 'tags'

[markup.goldmark.renderer]
  unsafe = true

[params.darkMode]
  enabled = true
  defaultMode = 'auto'
  storageKey = 'theme-preference'
