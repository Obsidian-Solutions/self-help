# ============================================================================
# Hugo Configuration - MindFull Theme
# ============================================================================

baseURL = 'https://obsidiansolutions.co.uk/self-help/'
languageCode = 'en-US'
title = 'MindFull'
description = 'Science-backed CBT tools and expert guidance.'
relativeURLs = false
canonifyURLs = false

[params]
  author = 'MindFull Team'
  cms_url = 'http://localhost:3000'

# Output Formats
[mediaTypes]
  [mediaTypes."text/x-cms-snippet"]
    suffixes = ["snippet"]

[outputFormats]
  [outputFormats.CMS]
    name = "CMS"
    baseName = "cms"
    mediaType = "text/x-cms-snippet"
    isHTML = true

[outputs]
  home = ['HTML']
  page = ['HTML', 'CMS']
  section = ['HTML', 'CMS']

[taxonomies]
  category = 'categories'
  tag = 'tags'

[markup.goldmark.renderer]
  unsafe = true

[params.darkMode]
  enabled = true
  defaultMode = 'auto'
  storageKey = 'theme-preference'
